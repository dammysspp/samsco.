<!DOCTYPE html>
<html>

<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

        body {
            font-family: 'Inter', Helvetica, Arial, sans-serif;
            background-color: #000000;
            margin: 0;
            padding: 40px 0;
            -webkit-font-smoothing: antialiased;
            color: #ffffff;
        }

        .container {
            max-width: 580px;
            margin: 0 auto;
            background-color: #111111;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Premium Header with subtle gradient */
        .header {
            background: linear-gradient(135deg, #0a0a0a 0%, #161616 100%);
            padding: 40px 0 50px;
            text-align: center;
            color: #ffffff;
            position: relative;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Decorative glowing dot */
        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #0071e3, #bf5af2, #0071e3);
            opacity: 0.8;
        }

        .brand-name {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            margin: 0;
            color: #ffffff;
            display: inline-block;
        }

        .brand-dot {
            color: #0071e3;
        }

        .badge {
            display: inline-block;
            background: rgba(0, 113, 227, 0.15);
            padding: 6px 14px;
            border-radius: 20px;
            margin-top: 15px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #64d2ff;
            border: 1px solid rgba(0, 113, 227, 0.3);
        }

        .content {
            padding: 40px;
            color: #e5e5e5;
        }

        .greeting {
            font-size: 18px;
            font-weight: 500;
            color: #ffffff;
            margin-bottom: 30px;
            text-align: center;
        }

        /* Card-like fields */
        .field-card {
            background-color: #1c1c1e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .field-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #86868b;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .field-value {
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
            word-break: break-word;
        }

        /* Message Box styling */
        .message-card {
            background-color: rgba(0, 113, 227, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 113, 227, 0.2);
            position: relative;
        }

        .message-card::before {
            content: '"';
            position: absolute;
            top: 10px;
            left: 14px;
            font-size: 40px;
            color: rgba(0, 113, 227, 0.4);
            font-family: serif;
            line-height: 1;
        }

        .btn-container {
            text-align: center;
            margin: 35px 0 10px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #0071e3, #0077ed);
            color: white;
            padding: 14px 32px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 4px 20px rgba(0, 113, 227, 0.4);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer {
            background-color: #0d0d0d;
            color: #555;
            text-align: center;
            padding: 30px;
            font-size: 12px;
            border-top: 1px solid #1a1a1a;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Premium Header -->
        <div class="header">
            <h1 class="brand-name">SAMSCO<span class="brand-dot">.</span></h1><br>
            <div class="badge">New Inquiry Received</div>
        </div>

        <!-- content -->
        <div class="content">
            <p class="greeting">You have a new message from your portfolio.</p>

            <div class="field-card">
                <span class="field-label">From</span>
                <div class="field-value">{{user_name}}</div>
            </div>

            <div class="field-card">
                <span class="field-label">Email Address</span>
                <div class="field-value">
                    <a href="mailto:{{user_email}}"
                        style="color: #64d2ff; text-decoration: none; font-weight: 500;">{{user_email}}</a>
                </div>
            </div>

            <div class="message-card">
                <span class="field-label" style="color: #64d2ff; margin-bottom: 12px;">Message Content</span>
                <div class="field-value" style="font-style: italic; color: #e5e5e5; line-height: 1.6;">
                    {{message}}
                </div>
            </div>

            <div class="btn-container">
                <a href="mailto:{{user_email}}?subject=Re: Project Inquiry | Samsco Communications" class="btn">Reply
                    Now</a>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            &copy; 2026 Samsco Communications Automated System.<br>
            <span style="opacity: 0.6;">Securely delivered via samsco.vercel.app</span>
        </div>
    </div>
</body>

</html>
